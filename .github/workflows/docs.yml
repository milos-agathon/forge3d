name: Docs

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/docs.yml"
      - "README.md"
      - "docs/**"
      - "pyproject.toml"
      - "python/**"
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/docs.yml"
      - "README.md"
      - "docs/**"
      - "pyproject.toml"
      - "python/**"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  pages: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build Docs
    runs-on: ubuntu-latest
    env:
      FORGE3D_DOCS_BASE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install docs dependencies
        run: python -m pip install --upgrade pip sphinx myst-parser sphinx-rtd-theme

      - name: Build Sphinx HTML
        run: python -m sphinx -b html docs docs/_build/html

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html

  deploy:
    name: Deploy Docs
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
