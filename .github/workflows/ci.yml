name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ============================================================================
  # Terrain Visual Change Detection
  # ============================================================================
  terrain-golden-paths:
    name: Terrain Golden Paths
    runs-on: ubuntu-latest
    outputs:
      terrain_goldens: ${{ steps.filter.outputs.terrain_goldens }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect terrain visual changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            terrain_goldens:
              - '.github/workflows/ci.yml'
              - 'src/shaders/**/*.wgsl'
              - 'src/terrain/**'
              - 'src/viewer/terrain/**'
              - 'python/forge3d/terrain*.py'
              - 'examples/terrain*.py'
              - 'tests/test_terrain_visual_goldens.py'
              - 'tests/test_terrain_tv10_goldens.py'
              - 'tests/golden/terrain/**'

  # ============================================================================
  # Rust Tests (cargo test)
  # ============================================================================
  test-rust:
    name: Test Rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install system dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libvulkan-dev

      - name: Run cargo check
        run: cargo check --workspace --features default,async_readback,copc_laz,weighted-oit,enable-pbr,enable-ibl,enable-csm,enable-tbn,enable-normal-mapping,enable-hdr-offscreen,enable-render-bundles,enable-renderer-config,enable-memory-pools,enable-staging-rings

      - name: Run cargo test (skip GPU-dependent tests)
        run: cargo test --workspace --features default,async_readback,copc_laz,weighted-oit,enable-pbr,enable-ibl,enable-csm,enable-tbn,enable-normal-mapping,enable-hdr-offscreen,enable-render-bundles,enable-renderer-config,enable-memory-pools,enable-staging-rings -- --test-threads=1 --skip gpu_extrusion --skip brdf_tile
        env:
          RUST_TEST_THREADS: 1

      - name: Run cargo clippy
        run: cargo clippy --workspace --features default,async_readback,copc_laz,weighted-oit,enable-pbr,enable-ibl,enable-csm,enable-tbn,enable-normal-mapping,enable-hdr-offscreen,enable-render-bundles,enable-renderer-config,enable-memory-pools,enable-staging-rings -- -D warnings

  # ============================================================================
  # Interactive Viewer E2E (macOS only; optional)
  # ============================================================================
  test-interactive-viewer-macos:
    name: Interactive Viewer (macOS)
    needs: build-wheels
    runs-on: macos-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Download macOS wheel artifact
        uses: actions/download-artifact@v4
        with:
          name: wheels-macos
          path: dist/

      - name: Install wheel and pytest
        run: |
          python scripts/install_compatible_wheel.py dist
          pip install pytest numpy

      - name: Run interactive viewer tests
        env:
          FORGE3D_NO_BOOTSTRAP: '1'
          RUN_INTERACTIVE_VIEWER_CI: '1'
        run: |
          pytest tests/ -m interactive_viewer -v --tb=short
        continue-on-error: true

  # ============================================================================
  # Python Wheel Build (maturin)
  # ============================================================================
  build-wheels:
    name: Build Wheel (${{ matrix.platform.os }})
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - os: windows
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            maturin_args: --release --out dist
          - os: linux
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            maturin_args: --release --out dist -i python3.10
          - os: macos
            runner: macos-latest
            target: universal2-apple-darwin
            maturin_args: --release --out dist
          - os: linux-arm
            runner: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            maturin_args: --release --out dist -i python3.10

    steps:
      - uses: actions/checkout@v4

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: ${{ matrix.platform.maturin_args }}
          manylinux: auto

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.platform.os }}
          path: dist/*.whl

  # ============================================================================
  # Python Tests (pytest)
  # ============================================================================
  test-python:
    name: Test Python (${{ matrix.os }})
    needs: build-wheels
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        python-version: ['3.10', '3.11', '3.12', '3.13']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Download wheel artifact
        uses: actions/download-artifact@v4
        with:
          name: wheels-${{ runner.os == 'Windows' && 'windows' || runner.os == 'Linux' && 'linux' || 'macos' }}
          path: dist/

      - name: Install wheel and test dependencies
        run: |
          python scripts/install_compatible_wheel.py dist
          pip install pytest numpy pillow

      - name: Run install smoke tests
        env:
          FORGE3D_NO_BOOTSTRAP: '1'
        run: pytest tests/test_install_smoke.py -v --tb=short

      - name: Run license tests
        env:
          FORGE3D_NO_BOOTSTRAP: '1'
        run: pytest tests/test_license.py -v --tb=short

      - name: Run pytest (skip viewer/GPU tests)
        env:
          FORGE3D_NO_BOOTSTRAP: '1'
        run: pytest tests/ -v --tb=short -m "not viewer and not interactive_viewer and not offscreen"

  # ============================================================================
  # Linux aarch64 Wheel Smoke Test (QEMU)
  # ============================================================================
  test-python-linux-arm:
    name: Install Smoke (linux-arm)
    needs: build-wheels
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Download linux-arm wheel artifact
        uses: actions/download-artifact@v4
        with:
          name: wheels-linux-arm
          path: dist/

      - name: Run smoke test in arm64 container
        shell: bash
        run: |
          docker run --rm --platform linux/arm64/v8 \
            -v "${PWD}:/workspace" \
            -w /workspace \
            python:3.11-slim \
            bash -lc "python -m pip install -U pip pytest && python /workspace/scripts/install_compatible_wheel.py /workspace/dist && FORGE3D_NO_BOOTSTRAP=1 pytest tests/test_install_smoke.py -v --tb=short"

  # ============================================================================
  # Terrain Golden Image Tests
  # ============================================================================
  test-golden-images:
    name: Terrain Goldens
    needs: [build-wheels, terrain-golden-paths]
    runs-on: windows-latest
    if: github.event_name == 'workflow_dispatch' || needs.terrain-golden-paths.outputs.terrain_goldens == 'true'
    env:
      # The terrain shader path is not GL-safe on hosted runners; pin a stable backend.
      WGPU_BACKEND: dx12

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Download wheel artifact
        uses: actions/download-artifact@v4
        with:
          name: wheels-windows
          path: dist/

      - name: Install wheel and test dependencies
        run: |
          python scripts/install_compatible_wheel.py dist
          pip install pytest numpy

      - name: Probe terrain golden backend
        id: terrain-goldens-probe
        continue-on-error: true
        env:
          FORGE3D_NO_BOOTSTRAP: '1'
        run: python scripts/terrain_ci_probe.py --mode terrain

      - name: Run terrain golden tests
        if: steps.terrain-goldens-probe.outcome == 'success'
        env:
          FORGE3D_NO_BOOTSTRAP: '1'
          FORGE3D_RUN_TERRAIN_GOLDENS: '1'
          FORGE3D_TERRAIN_GOLDEN_ARTIFACT_DIR: tests/artifacts/terrain_goldens
        run: pytest tests/test_terrain_visual_goldens.py tests/test_terrain_tv10_goldens.py -v --tb=short

      - name: Skip unsupported terrain golden lane
        if: steps.terrain-goldens-probe.outcome != 'success'
        run: echo "Skipping terrain golden tests on unsupported hosted-runner adapter."

      - name: Upload golden image artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: terrain-golden-diffs
          path: tests/artifacts/terrain_goldens/

  # ============================================================================
  # Example Sanity Tests (640×360 renders within 90s)
  # ============================================================================
  test-examples:
    name: Example Sanity (${{ matrix.os }})
    needs: build-wheels
    runs-on: ${{ matrix.os }}
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
        example:
          - name: "Triangle"
            script: "examples/triangle_png.py"
            args: "--width 640 --height 360"
          - name: "Terrain Single Tile"
            script: "examples/terrain_single_tile.py"
            args: ""
          - name: "Terrain TV2 AOV EXR"
            script: "examples/terrain_tv2_aov_exr_demo.py"
            args: "--width 640 --height 360 --max-dem-size 384"
          - name: "Terrain TV4 Material Variation"
            script: "examples/terrain_tv4_material_variation_demo.py"
            args: "--width 640 --height 360 --max-dem-size 384"
          - name: "PNG NumPy Roundtrip"
            script: "examples/png_numpy_roundtrip.py"
            args: ""

    steps:
      - uses: actions/checkout@v4

      - name: Install Vulkan runtime (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libvulkan1 mesa-vulkan-drivers

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Download wheel artifact
        uses: actions/download-artifact@v4
        with:
          name: wheels-${{ runner.os == 'Windows' && 'windows' || 'linux' }}
          path: dist/

      - name: Install wheel and dependencies
        run: |
          python scripts/install_compatible_wheel.py dist
          pip install numpy pillow

      - name: Probe terrain TV2 example backend
        if: matrix.example.name == 'Terrain TV2 AOV EXR' || matrix.example.name == 'Terrain TV4 Material Variation'
        id: terrain-tv2-probe
        continue-on-error: true
        env:
          FORGE3D_NO_BOOTSTRAP: '1'
          # Force terrain examples onto a deterministic backend instead of the hosted runner default.
          WGPU_BACKEND: ${{ matrix.os == 'windows-latest' && 'dx12' || 'vulkan' }}
        run: python scripts/terrain_ci_probe.py --mode ${{ matrix.example.name == 'Terrain TV2 AOV EXR' && 'terrain-aov' || 'terrain' }}

      - name: "Run example: ${{ matrix.example.name }}"
        if: ((matrix.example.name != 'Terrain TV2 AOV EXR') && (matrix.example.name != 'Terrain TV4 Material Variation')) || steps.terrain-tv2-probe.outcome == 'success'
        env:
          # Force terrain examples onto a deterministic backend instead of the hosted runner default.
          WGPU_BACKEND: ${{ matrix.os == 'windows-latest' && 'dx12' || 'vulkan' }}
        run: python ${{ matrix.example.script }} ${{ matrix.example.args }}
        timeout-minutes: 2

      - name: Skip unsupported terrain example
        if: (matrix.example.name == 'Terrain TV2 AOV EXR' || matrix.example.name == 'Terrain TV4 Material Variation') && steps.terrain-tv2-probe.outcome != 'success'
        run: echo "Skipping terrain example on unsupported hosted-runner adapter."

      - name: Verify output exists
        if: ((matrix.example.name != 'Terrain TV2 AOV EXR') && (matrix.example.name != 'Terrain TV4 Material Variation')) || steps.terrain-tv2-probe.outcome == 'success'
        shell: bash
        run: |
          if find . -type f \( -name '*.png' -o -name '*.exr' \) | grep -q .; then
            echo "✓ Render artifact found"
          else
            echo "✗ No render artifact found"
            exit 1
          fi

  # ============================================================================
  # Documentation Build
  # ============================================================================
  build-docs:
    name: Build Documentation
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build Rust docs
        run: cargo doc --workspace --features default,async_readback,copc_laz,weighted-oit,enable-pbr,enable-ibl,enable-csm,enable-tbn,enable-normal-mapping,enable-hdr-offscreen,enable-render-bundles,enable-renderer-config,enable-memory-pools,enable-staging-rings --no-deps

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Sphinx dependencies
        run: |
          pip install sphinx sphinx-rtd-theme myst-parser numpy pillow ipywidgets pooch

      - name: Build Sphinx docs
        run: |
          cd docs
          make html

      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: documentation
          path: |
            target/doc/
            docs/_build/html/

  # ============================================================================
  # Final Status
  # ============================================================================
  ci-success:
    name: CI Success
    needs: [terrain-golden-paths, test-rust, build-wheels, test-python, test-python-linux-arm, test-golden-images, build-docs]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Check all jobs succeeded
        run: |
          if [ "${{ needs.terrain-golden-paths.result }}" != "success" ] || \
             [ "${{ needs.test-rust.result }}" != "success" ] || \
             [ "${{ needs.build-wheels.result }}" != "success" ] || \
             [ "${{ needs.test-python.result }}" != "success" ] || \
             [ "${{ needs.test-python-linux-arm.result }}" != "success" ] || \
             { [ "${{ needs.test-golden-images.result }}" != "success" ] && [ "${{ needs.test-golden-images.result }}" != "skipped" ]; } || \
             [ "${{ needs.build-docs.result }}" != "success" ]; then
            echo "❌ CI failed"
            exit 1
          else
            echo "✅ CI passed"
          fi
