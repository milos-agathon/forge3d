name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ============================================================================
  # Visual Golden Change Detection
  # ============================================================================
  terrain-golden-paths:
    name: Visual Golden Paths
    runs-on: ubuntu-latest
    outputs:
      terrain_goldens: ${{ steps.filter.outputs.terrain_goldens }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect visual golden changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            terrain_goldens:
              - '.github/workflows/ci.yml'
              - 'src/**'
              - 'python/**'
              - 'src/shaders/**/*.wgsl'
              - 'src/terrain/**'
              - 'src/viewer/terrain/**'
              - 'python/forge3d/terrain*.py'
              - 'examples/terrain*.py'
              - 'tests/test_terrain_visual_goldens.py'
              - 'tests/test_terrain_tv10_goldens.py'
              - 'tests/test_terrain_vt_pbr_families.py'
              - 'tests/test_recipe_goldens.py'
              - 'tests/test_adjudication_gate.py'
              - 'tests/test_hybrid_terrain_pt.py'
              - 'tests/_deltae.py'
              - 'tests/golden/terrain/**'
              - 'tests/golden/recipes/**'
              - 'tests/golden/adjudication/**'
              - 'tests/golden/hybrid_terrain/**'
              - 'docs/gallery/**'

  # ============================================================================
  # Rust Tests (cargo test)
  # ============================================================================
  test-rust:
    name: Test Rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install system dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libvulkan-dev libproj-dev libsqlite3-dev sqlite3 pkg-config

      - name: Run cargo check
        run: cargo check --workspace --features default,async_readback,copc_laz,cog_streaming,gis-remote,geos-topology,weighted-oit,wsI_bigbuf,wsI_double_buf,enable-pbr,enable-tbn,enable-normal-mapping,enable-hdr-offscreen,enable-renderer-config,enable-staging-rings

      - name: Run cargo check (system PROJ feature)
        if: matrix.os == 'ubuntu-latest'
        run: cargo check --workspace --features proj

      - name: Run cargo test (skip GPU-dependent tests)
        run: cargo test --workspace --features default,async_readback,copc_laz,cog_streaming,gis-remote,geos-topology,weighted-oit,wsI_bigbuf,wsI_double_buf,enable-pbr,enable-tbn,enable-normal-mapping,enable-hdr-offscreen,enable-renderer-config,enable-staging-rings -- --test-threads=1 --skip gpu_extrusion --skip brdf_tile
        env:
          RUST_TEST_THREADS: 1

      - name: Run cargo clippy
        run: cargo forge3d-clippy

  # ============================================================================
  # Interactive Viewer E2E (macOS only; optional)
  #
  # INFORMATIONAL ONLY: this job is `continue-on-error: true` on its test step
  # and is deliberately NOT in `ci-success` needs. Its result never gates the
  # build. The interactive lane's test files are accounted for by the
  # `interactive_viewer` marker in the UNRUN/(e)-gate bookkeeping, not here.
  # ============================================================================
  test-interactive-viewer-macos:
    name: Interactive Viewer (macOS)
    needs: build-wheels
    runs-on: macos-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Download macOS wheel artifact
        uses: actions/download-artifact@v4
        with:
          name: wheels-macos
          path: dist/

      - name: Install wheel and pytest
        run: |
          python scripts/install_compatible_wheel.py dist
          pip install pytest numpy

      - name: Run interactive viewer tests
        env:
          FORGE3D_NO_BOOTSTRAP: '1'
          RUN_INTERACTIVE_VIEWER_CI: '1'
        run: |
          pytest tests/ -m interactive_viewer -v --tb=short
        continue-on-error: true

  # ============================================================================
  # Python Wheel Build (maturin)
  # ============================================================================
  build-wheels:
    name: Build Wheel (${{ matrix.platform.os }})
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - os: windows
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            maturin_args: --release --out dist
            manylinux: auto
          - os: linux
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            maturin_args: --release --out dist -i python3.10
            manylinux: off
          - os: macos
            runner: macos-latest
            target: universal2-apple-darwin
            maturin_args: --release --out dist
            manylinux: auto
          - os: linux-arm
            runner: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            maturin_args: --release --out dist -i python3.10
            manylinux: auto

    steps:
      - uses: actions/checkout@v4

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        env:
          # ring's aarch64 assembly expects this macro under the manylinux cross compiler.
          CFLAGS_aarch64_unknown_linux_gnu: ${{ matrix.platform.target == 'aarch64-unknown-linux-gnu' && '-D__ARM_ARCH=8' || '' }}
        with:
          target: ${{ matrix.platform.target }}
          args: ${{ matrix.platform.maturin_args }}
          manylinux: ${{ matrix.platform.manylinux }}

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.platform.os }}
          path: dist/*.whl

  # ============================================================================
  # Python Tests (pytest)
  # ============================================================================
  test-python:
    name: Test Python (${{ matrix.os }})
    needs: build-wheels
    runs-on: ${{ matrix.os }}
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        python-version: ['3.10', '3.11', '3.12', '3.13']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Download wheel artifact
        uses: actions/download-artifact@v4
        with:
          name: wheels-${{ runner.os == 'Windows' && 'windows' || runner.os == 'Linux' && 'linux' || 'macos' }}
          path: dist/

      - name: Install wheel and test dependencies
        run: |
          python scripts/install_compatible_wheel.py dist
          pip install pytest numpy pillow mypy

      - name: Run install smoke tests
        env:
          FORGE3D_NO_BOOTSTRAP: '1'
        run: pytest tests/test_install_smoke.py -v --tb=short

      - name: Run license tests
        env:
          FORGE3D_NO_BOOTSTRAP: '1'
        run: pytest tests/test_license.py -v --tb=short

      - name: Run default Python test lane (CENSOR honesty gate)
        env:
          FORGE3D_NO_BOOTSTRAP: '1'
        run: python scripts/ci_pytest_lane.py -v --tb=short

  # ============================================================================
  # Linux aarch64 Wheel Smoke Test (QEMU)
  # ============================================================================
  test-python-linux-arm:
    name: Install Smoke (linux-arm)
    needs: build-wheels
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Download linux-arm wheel artifact
        uses: actions/download-artifact@v4
        with:
          name: wheels-linux-arm
          path: dist/

      - name: Run smoke test in arm64 container
        shell: bash
        run: |
          docker run --rm --platform linux/arm64/v8 \
            -v "${PWD}:/workspace" \
            -w /workspace \
            python:3.11-slim \
            bash -lc "python -m pip install -U pip pytest && python /workspace/scripts/install_compatible_wheel.py /workspace/dist && FORGE3D_NO_BOOTSTRAP=1 pytest tests/test_install_smoke.py -v --tb=short"

  # ============================================================================
  # Visual Golden Image Tests
  # ============================================================================
  test-golden-images:
    name: Visual Goldens
    needs: [build-wheels, terrain-golden-paths]
    # macos-14 is the repository's gated real-GPU lane (Metal). Hosted
    # Windows runners only expose WARP here, which made this job perpetually
    # report ABSENT and prevented an actual image mismatch from failing CI.
    runs-on: macos-14
    if: github.event_name == 'workflow_dispatch' || needs.terrain-golden-paths.outputs.terrain_goldens == 'true'
    # Expose which lane actually executed so ci-success can print an honest
    # `ran|absent` distinction instead of treating both as opaque success.
    outputs:
      lane: ${{ steps.golden-absent.outputs.golden_lane || steps.golden-ran.outputs.golden_lane || 'unknown' }}
    env:
      # Pin the hardware backend before the native module initializes.
      WGPU_BACKEND: metal
      # Permit the real-metal golden job through the test helper's conservative
      # hosted-macOS guard only after this job's terrain probe has succeeded.
      FORGE3D_ALLOW_HOSTED_MACOS_TERRAIN: '1'
      # Explicit opt-in for non-GPU environments that may only run recipe-level CPU goldens.
      FORGE3D_ALLOW_SOFTWARE_GOLDENS: ${{ vars.FORGE3D_ALLOW_SOFTWARE_GOLDENS }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Download wheel artifact
        uses: actions/download-artifact@v4
        with:
          name: wheels-macos
          path: dist/

      - name: Install wheel and test dependencies
        run: |
          python scripts/install_compatible_wheel.py dist
          pip install pytest numpy pyproj

      # Probe contract (CENSOR F-10): exit 0 = probe positive, exit 2 = no
      # CI-safe adapter (honest ABSENT), exit 3 = adapter present but the smoke
      # render crashed — a renderer defect that must FAIL this job rather than
      # masquerade as hardware absence. No continue-on-error: only the ABSENT
      # case maps to a zero exit with probe=absent.
      - name: Probe terrain golden backend
        if: env.FORGE3D_ALLOW_SOFTWARE_GOLDENS != '1'
        id: terrain-goldens-probe
        shell: bash
        env:
          FORGE3D_NO_BOOTSTRAP: '1'
        run: |
          set +e
          python scripts/terrain_ci_probe.py --mode terrain
          code=$?
          set -e
          if [ "$code" = "0" ]; then
            echo "probe=positive" >> "$GITHUB_OUTPUT"
          elif [ "$code" = "2" ]; then
            echo "probe=absent" >> "$GITHUB_OUTPUT"
          else
            echo "probe=crash" >> "$GITHUB_OUTPUT"
            echo "::error::terrain probe crashed on a CI-safe adapter (exit $code); failing the golden job instead of recording ABSENT"
            exit "$code"
          fi

      - name: Run visual golden tests
        if: env.FORGE3D_ALLOW_SOFTWARE_GOLDENS != '1' && steps.terrain-goldens-probe.outputs.probe == 'positive'
        env:
          FORGE3D_NO_BOOTSTRAP: '1'
          FORGE3D_RUN_TERRAIN_GOLDENS: '1'
          FORGE3D_TERRAIN_GOLDEN_ARTIFACT_DIR: tests/artifacts/terrain_goldens
          FORGE3D_RECIPE_GOLDEN_ARTIFACT_DIR: tests/artifacts/recipe_goldens
          FORGE3D_ADJUDICATION_ARTIFACT_DIR: tests/artifacts/adjudication
        run: pytest tests/test_terrain_visual_goldens.py tests/test_terrain_tv10_goldens.py tests/test_terrain_vt_pbr_families.py tests/test_recipe_goldens.py tests/test_adjudication_gate.py tests/test_hybrid_terrain_pt.py tests/test_provenance_veritas.py -v --tb=short

      - name: Record golden lane RAN
        if: env.FORGE3D_ALLOW_SOFTWARE_GOLDENS != '1' && steps.terrain-goldens-probe.outputs.probe == 'positive'
        id: golden-ran
        shell: bash
        run: echo "golden_lane=ran" >> "$GITHUB_OUTPUT"

      - name: Record golden lane ABSENT
        if: env.FORGE3D_ALLOW_SOFTWARE_GOLDENS != '1' && steps.terrain-goldens-probe.outputs.probe == 'absent'
        id: golden-absent
        shell: bash
        run: |
          mkdir -p golden-out
          echo "golden lane ABSENT: no usable hardware adapter on this hosted runner" | tee golden-out/goldens.ABSENT
          echo "golden_lane=absent" >> "$GITHUB_OUTPUT"

      - name: Upload golden lane marker
        if: steps.golden-absent.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: golden-lane-marker
          path: golden-out/
          if-no-files-found: error

      - name: Run software-allowed recipe goldens
        if: env.FORGE3D_ALLOW_SOFTWARE_GOLDENS == '1'
        env:
          FORGE3D_NO_BOOTSTRAP: '1'
          FORGE3D_RECIPE_GOLDEN_ARTIFACT_DIR: tests/artifacts/recipe_goldens
        run: pytest tests/test_recipe_goldens.py -v --tb=short

      - name: Upload golden image artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-golden-diffs
          path: tests/artifacts/

  # ============================================================================
  # Documentation Build
  # ============================================================================
  build-docs:
    name: Build Documentation
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build Rust docs
        run: cargo doc --workspace --features default,async_readback,copc_laz,cog_streaming,gis-remote,geos-topology,weighted-oit,wsI_bigbuf,wsI_double_buf,enable-pbr,enable-tbn,enable-normal-mapping,enable-hdr-offscreen,enable-renderer-config,enable-staging-rings --no-deps

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Sphinx dependencies
        run: |
          pip install sphinx sphinx-rtd-theme myst-parser numpy pillow ipywidgets pooch

      - name: Build Sphinx docs
        run: |
          cd docs
          make html

      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: documentation
          path: |
            target/doc/
            docs/_build/html/

  # ============================================================================
  # Final Status
  # ============================================================================
  ci-success:
    name: CI Success
    needs: [terrain-golden-paths, test-rust, build-wheels, test-python, test-python-linux-arm, test-golden-images, build-docs]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Check all jobs succeeded
        run: |
          # Golden lane honesty: `test-golden-images` is gated by the
          # `terrain-golden-paths` paths filter via its job-level `if:`. When no
          # golden-relevant path changed the job is `skipped` — that is the ONLY
          # reason `skipped` is acceptable here. Whenever the paths filter DID
          # run the job, a golden pytest mismatch fails the job (no
          # continue-on-error shields the pytest step) and therefore fails this
          # aggregator. `absent` (no usable adapter) still reports as job
          # `success` and is surfaced by the lane line below, not swallowed.
          echo "golden lane: ${{ needs.test-golden-images.outputs.lane || 'skipped(paths)' }}"
          if [ "${{ needs.terrain-golden-paths.result }}" != "success" ] || \
             [ "${{ needs.test-rust.result }}" != "success" ] || \
             [ "${{ needs.build-wheels.result }}" != "success" ] || \
             [ "${{ needs.test-python.result }}" != "success" ] || \
             [ "${{ needs.test-python-linux-arm.result }}" != "success" ] || \
             { [ "${{ needs.test-golden-images.result }}" != "success" ] && [ "${{ needs.test-golden-images.result }}" != "skipped" ]; } || \
             [ "${{ needs.build-docs.result }}" != "success" ]; then
            echo "❌ CI failed"
            exit 1
          else
            echo "✅ CI passed"
          fi
