name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      update_recipe_certificates:
        description: Refresh signed recipe certificates after a reviewed WGSL change.
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  pull-requests: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ============================================================================
  # Shared Git LFS fixtures
  #
  # Hosted matrix jobs start on fresh machines. Fetching LFS in every checkout
  # multiplied the same download across all 12 Python jobs plus visual/M-06
  # lanes. Resolve the exact union once, package lane-specific subsets, and let
  # consumers restore those subsets from one short-lived Actions artifact.
  # ============================================================================
  prepare-lfs-fixtures:
    name: Prepare LFS Fixtures
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Download the required LFS objects once
        shell: bash
        run: |
          git lfs install --local
          git lfs pull \
            --include="assets/tif/Mount_Fuji_30m.tif,assets/tif/dem_rainier.tif,assets/tif/switzerland_dem.tif" \
            --exclude=""

          for fixture in \
            assets/tif/Mount_Fuji_30m.tif \
            assets/tif/dem_rainier.tif \
            assets/tif/switzerland_dem.tif; do
            if [ "$(wc -c < "$fixture")" -le 1024 ]; then
              echo "::error::$fixture is still an LFS pointer"
              exit 1
            fi
          done

      - name: Package lane-specific fixture subsets
        shell: bash
        run: |
          mkdir -p lfs-fixture-bundles
          zip -q lfs-fixture-bundles/python-tiffs.zip \
            assets/tif/Mount_Fuji_30m.tif \
            assets/tif/dem_rainier.tif \
            assets/tif/switzerland_dem.tif
          zip -q lfs-fixture-bundles/m06-dem.zip \
            assets/tif/switzerland_dem.tif

      - name: Upload shared LFS fixture bundles
        uses: actions/upload-artifact@v4
        with:
          name: lfs-fixture-bundles
          path: lfs-fixture-bundles/*.zip
          if-no-files-found: error
          retention-days: 1

  # ============================================================================
  # Visual Golden Change Detection
  # ============================================================================
  terrain-golden-paths:
    name: Visual Golden Paths
    runs-on: ubuntu-latest
    outputs:
      terrain_goldens: ${{ steps.filter.outputs.terrain_goldens }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Detect visual golden changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            terrain_goldens:
              - '.github/workflows/ci.yml'
              - 'src/**'
              - 'python/**'
              - 'src/shaders/**/*.wgsl'
              - 'src/terrain/**'
              - 'src/viewer/terrain/**'
              - 'python/forge3d/terrain*.py'
              - 'examples/terrain*.py'
              - 'tests/test_terrain_visual_goldens.py'
              - 'tests/test_terrain_tv10_goldens.py'
              - 'tests/test_terrain_vt_pbr_families.py'
              - 'tests/test_recipe_goldens.py'
              - 'tests/test_adjudication_gate.py'
              - 'tests/test_hybrid_terrain_pt.py'
              - 'tests/_deltae.py'
              - 'tests/golden/terrain/**'
              - 'tests/golden/recipes/**'
              - 'tests/golden/adjudication/**'
              - 'tests/golden/hybrid_terrain/**'
              - 'docs/gallery/**'

  # ============================================================================
  # Rust Tests (cargo test)
  # ============================================================================
  test-rust:
    name: Test Rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install system dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libvulkan-dev libproj-dev libsqlite3-dev sqlite3 pkg-config

      - name: Run cargo check
        run: cargo check --workspace --features default,async_readback,copc_laz,cog_streaming,gis-remote,geos-topology,weighted-oit,wsI_bigbuf,wsI_double_buf,enable-pbr,enable-tbn,enable-normal-mapping,enable-hdr-offscreen,enable-renderer-config,enable-staging-rings,shader-contract-asserts

      - name: Run cargo check (system PROJ feature)
        if: matrix.os == 'ubuntu-latest'
        run: cargo check --workspace --features proj

      - name: Run cargo test (skip GPU-dependent tests)
        run: cargo test --workspace --features default,async_readback,copc_laz,cog_streaming,gis-remote,geos-topology,weighted-oit,wsI_bigbuf,wsI_double_buf,enable-pbr,enable-tbn,enable-normal-mapping,enable-hdr-offscreen,enable-renderer-config,enable-staging-rings,shader-contract-asserts -- --test-threads=1 --skip gpu_extrusion --skip brdf_tile
        env:
          RUST_TEST_THREADS: 1

      - name: Run doctests (proves the MENSURA compile_fail contracts)
        # Executes rustdoc examples, including the five `compile_fail` proofs in
        # src/geo/units.rs that make unit/height/CRS/epoch mismatches and the raw
        # f64->f32 world-coordinate narrowing genuinely fail to compile.
        run: cargo test --doc --workspace --features default,async_readback,copc_laz,cog_streaming,gis-remote,geos-topology,weighted-oit,wsI_bigbuf,wsI_double_buf,enable-pbr,enable-tbn,enable-normal-mapping,enable-hdr-offscreen,enable-renderer-config,enable-staging-rings,shader-contract-asserts

      - name: Run cargo clippy
        run: cargo forge3d-clippy

  # ============================================================================
  # Interactive Viewer E2E (macOS only; optional)
  #
  # INFORMATIONAL ONLY: this job is `continue-on-error: true` on its test step
  # and is deliberately NOT in `ci-success` needs. Its result never gates the
  # build. The interactive lane's test files are accounted for by the
  # `interactive_viewer` marker in the UNRUN/(e)-gate bookkeeping, not here.
  # ============================================================================
  test-interactive-viewer-macos:
    name: Interactive Viewer (macOS)
    needs: build-wheels
    runs-on: macos-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Download macOS wheel artifact
        uses: actions/download-artifact@v4
        with:
          name: wheels-macos
          path: dist/

      - name: Install wheel and pytest
        run: |
          python scripts/install_compatible_wheel.py dist
          pip install pytest numpy

      - name: Run interactive viewer tests
        env:
          FORGE3D_NO_BOOTSTRAP: '1'
          RUN_INTERACTIVE_VIEWER_CI: '1'
        run: |
          pytest tests/ -m interactive_viewer -v --tb=short
        continue-on-error: true

  # ============================================================================
  # Python Wheel Build (maturin)
  # ============================================================================
  build-wheels:
    name: Build Wheel (${{ matrix.platform.os }})
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - os: windows
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            maturin_args: --release --out dist
            manylinux: auto
          - os: linux
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            maturin_args: --release --out dist -i python3.10
            manylinux: off
          - os: macos
            runner: macos-latest
            target: universal2-apple-darwin
            maturin_args: --release --out dist
            manylinux: auto
          - os: linux-arm
            runner: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            maturin_args: --release --out dist -i python3.10
            manylinux: auto

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        env:
          # ring's aarch64 assembly expects this macro under the manylinux cross compiler.
          CFLAGS_aarch64_unknown_linux_gnu: ${{ matrix.platform.target == 'aarch64-unknown-linux-gnu' && '-D__ARM_ARCH=8' || '' }}
        with:
          target: ${{ matrix.platform.target }}
          args: ${{ matrix.platform.maturin_args }}
          manylinux: ${{ matrix.platform.manylinux }}

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.platform.os }}
          path: dist/*.whl

  # ============================================================================
  # Python Tests (pytest)
  # ============================================================================
  test-python:
    name: Test Python (${{ matrix.os }})
    needs: [build-wheels, prepare-lfs-fixtures]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        python-version: ['3.10', '3.11', '3.12', '3.13']

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Download shared LFS fixture artifact
        uses: actions/download-artifact@v4
        with:
          name: lfs-fixture-bundles
          path: lfs-fixture-bundles

      - name: Restore Python TIFF fixtures
        run: python -m zipfile -e lfs-fixture-bundles/python-tiffs.zip .

      - name: Download wheel artifact
        uses: actions/download-artifact@v4
        with:
          name: wheels-${{ runner.os == 'Windows' && 'windows' || runner.os == 'Linux' && 'linux' || 'macos' }}
          path: dist/

      - name: Install wheel and test dependencies
        run: |
          python scripts/install_compatible_wheel.py dist
          # pyproj/rasterio back the mensura CRS-reproject and MapScene alignment
          # tests in the default lane (the documented pyproj fallback path when the
          # native `proj` feature is not compiled into the wheel). Other lanes
          # already install pyproj; the default lane runs the WHOLE tests/ tree, so
          # it needs both to exercise those paths instead of erroring on import.
          pip install pytest numpy pillow mypy pyproj rasterio

      - name: Install system fonts (Linux)
        if: runner.os == 'Linux'
        # Legend/label helpers resolve DejaVu on Linux; hosted images ship no
        # fonts by default (found by the first exhaustive-lane CI run).
        run: sudo apt-get update && sudo apt-get install -y fonts-dejavu-core

      - name: Run install smoke tests
        env:
          FORGE3D_NO_BOOTSTRAP: '1'
        run: pytest tests/test_install_smoke.py -v --tb=short

      - name: Run license tests
        env:
          FORGE3D_NO_BOOTSTRAP: '1'
        run: pytest tests/test_license.py -v --tb=short

      - name: Run default Python test lane (CENSOR honesty gate)
        env:
          FORGE3D_NO_BOOTSTRAP: '1'
        run: python scripts/ci_pytest_lane.py -v --tb=short

  # ============================================================================
  # TERMINUS deterministic CPU-only robustness fuzzer
  #
  # The command performs exactly two fixed-seed passes internally and fails on
  # process death, timeout, property mismatch, or digest drift. It exercises
  # only CPU-safe public APIs and never requests a GPU adapter.
  # ============================================================================
  test-terminus-fuzz:
    name: TERMINUS 10k Deterministic Fuzzer (CPU)
    needs: build-wheels
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - uses: actions/download-artifact@v4
        with:
          name: wheels-linux
          path: dist/

      - name: Install wheel and fuzzer dependencies
        run: |
          python scripts/install_compatible_wheel.py dist
          pip install numpy

      - name: Run two deterministic 10k passes
        env:
          FORGE3D_NO_BOOTSTRAP: '1'
        run: |
          set -o pipefail
          mkdir -p target/terminus-fuzz-evidence
          python -m tests._fuzz \
            --cases 10000 \
            --seed 42 \
            --tmp-dir target/terminus-fuzz \
            --summary-json target/terminus-fuzz-evidence/terminus-fuzz-summary.json \
            --summary-markdown target/terminus-fuzz-evidence/terminus-fuzz-summary.md \
            2>&1 | tee target/terminus-fuzz-evidence/terminus-fuzz.log
          cat target/terminus-fuzz-evidence/terminus-fuzz-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload TERMINUS fuzzer evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: terminus-fuzzer-evidence
          path: target/terminus-fuzz-evidence/
          if-no-files-found: error

  # ============================================================================
  # Linux aarch64 Wheel Smoke Test (QEMU)
  # ============================================================================
  test-python-linux-arm:
    name: Install Smoke (linux-arm)
    needs: build-wheels
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Download linux-arm wheel artifact
        uses: actions/download-artifact@v4
        with:
          name: wheels-linux-arm
          path: dist/

      - name: Run smoke test in arm64 container
        shell: bash
        run: |
          docker run --rm --platform linux/arm64/v8 \
            -v "${PWD}:/workspace" \
            -w /workspace \
            python:3.11-slim \
            bash -lc "python -m pip install -U pip pytest numpy && python /workspace/scripts/install_compatible_wheel.py /workspace/dist && FORGE3D_NO_BOOTSTRAP=1 pytest tests/test_install_smoke.py -v --tb=short"

  # ============================================================================
  # Visual Golden Image Tests
  # ============================================================================
  test-golden-images:
    name: Visual Goldens
    needs: [build-wheels, terrain-golden-paths]
    # macos-14 is the repository's gated real-GPU lane (Metal). Hosted
    # Windows runners only expose WARP here, which made this job perpetually
    # report ABSENT and prevented an actual image mismatch from failing CI.
    runs-on: macos-14
    if: github.event_name == 'workflow_dispatch' || needs.terrain-golden-paths.outputs.terrain_goldens == 'true'
    # Expose which lane actually executed so ci-success can print an honest
    # `ran|absent` distinction instead of treating both as opaque success.
    outputs:
      lane: ${{ steps.golden-absent.outputs.golden_lane || steps.golden-ran.outputs.golden_lane || 'unknown' }}
    env:
      # Pin the hardware backend before the native module initializes.
      WGPU_BACKEND: metal
      # Permit the real-metal golden job through the test helper's conservative
      # hosted-macOS guard only after this job's terrain probe has succeeded.
      FORGE3D_ALLOW_HOSTED_MACOS_TERRAIN: '1'
      # Explicit opt-in for non-GPU environments that may only run recipe-level CPU goldens.
      FORGE3D_ALLOW_SOFTWARE_GOLDENS: ${{ vars.FORGE3D_ALLOW_SOFTWARE_GOLDENS }}
      # Internal/release runs are the protected production-signing lane.
      # Fork PRs do not receive secrets and are explicitly marked untrusted
      # below; they never masquerade as production-signed validation.
      FORGE3D_CERT_SIGNING_KEY: ${{ secrets.FORGE3D_CERT_SIGNING_KEY }}
      FORGE3D_REQUIRE_PRODUCTION_SIGNING: ${{ (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) && '1' || '0' }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          # Pixel baselines under tests/golden are regular Git objects. This
          # lane's scenes are generated in-test, so it needs no LFS fixture.

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Download wheel artifact
        uses: actions/download-artifact@v4
        with:
          name: wheels-macos
          path: dist/

      - name: Install wheel and test dependencies
        run: |
          python scripts/install_compatible_wheel.py dist
          pip install pytest numpy pyproj pillow

      - name: Require production certificate signing key
        if: env.FORGE3D_REQUIRE_PRODUCTION_SIGNING == '1'
        shell: bash
        run: |
          if [ -z "$FORGE3D_CERT_SIGNING_KEY" ]; then
            echo "::error::protected golden lane requires FORGE3D_CERT_SIGNING_KEY"
            exit 1
          fi

      - name: Mark external PR certificate lane untrusted
        if: env.FORGE3D_REQUIRE_PRODUCTION_SIGNING != '1'
        shell: bash
        run: echo "### Certificate provenance — UNTRUSTED external PR (production signing secret unavailable by policy)" >> "$GITHUB_STEP_SUMMARY"

      # Probe contract (CENSOR F-10): exit 0 = probe positive, exit 2 = no
      # CI-safe adapter (honest ABSENT), exit 3 = adapter present but the smoke
      # render crashed — a renderer defect that must FAIL this job rather than
      # masquerade as hardware absence. No continue-on-error: only the ABSENT
      # case maps to a zero exit with probe=absent.
      - name: Probe terrain golden backend
        if: env.FORGE3D_ALLOW_SOFTWARE_GOLDENS != '1'
        id: terrain-goldens-probe
        shell: bash
        env:
          FORGE3D_NO_BOOTSTRAP: '1'
        run: |
          set +e
          python scripts/terrain_ci_probe.py --mode terrain
          code=$?
          set -e
          if [ "$code" = "0" ]; then
            echo "probe=positive" >> "$GITHUB_OUTPUT"
          elif [ "$code" = "2" ]; then
            echo "probe=absent" >> "$GITHUB_OUTPUT"
          else
            echo "probe=crash" >> "$GITHUB_OUTPUT"
            echo "::error::terrain probe crashed on a CI-safe adapter (exit $code); failing the golden job instead of recording ABSENT"
            exit "$code"
          fi

      - name: Run visual golden tests
        if: env.FORGE3D_ALLOW_SOFTWARE_GOLDENS != '1' && steps.terrain-goldens-probe.outputs.probe == 'positive'
        env:
          FORGE3D_NO_BOOTSTRAP: '1'
          FORGE3D_RUN_TERRAIN_GOLDENS: '1'
          FORGE3D_TERRAIN_GOLDEN_ARTIFACT_DIR: tests/artifacts/terrain_goldens
          FORGE3D_RECIPE_GOLDEN_ARTIFACT_DIR: tests/artifacts/recipe_goldens
          FORGE3D_UPDATE_RECIPE_CERTIFICATES: '0'
          # This dedicated hardware lane anchors the CENSOR recipe-pixel gate
          # on the Metal reference for its terrain control scene. The complete
          # recipe catalog remains exercised by the normal GPU suite.
          FORGE3D_RECIPE_GOLDEN_VARIANT: metal
        run: pytest tests/test_terrain_visual_goldens.py tests/test_terrain_tv10_goldens.py tests/test_terrain_vt_pbr_families.py tests/test_recipe_goldens.py::test_recipe_golden_gate_rejects_pixel_regression 'tests/test_recipe_goldens.py::test_recipe_goldens_render_and_match[mapscene_terrain_raster]' -v --tb=short

      - name: Record golden lane RAN
        if: env.FORGE3D_ALLOW_SOFTWARE_GOLDENS != '1' && steps.terrain-goldens-probe.outputs.probe == 'positive'
        id: golden-ran
        shell: bash
        run: echo "golden_lane=ran" >> "$GITHUB_OUTPUT"

      - name: Record golden lane ABSENT
        if: env.FORGE3D_ALLOW_SOFTWARE_GOLDENS != '1' && steps.terrain-goldens-probe.outputs.probe == 'absent'
        id: golden-absent
        shell: bash
        run: |
          mkdir -p golden-out
          echo "golden lane ABSENT: no usable hardware adapter on this hosted runner" | tee golden-out/goldens.ABSENT
          echo "golden_lane=absent" >> "$GITHUB_OUTPUT"

      - name: Upload golden lane marker
        if: steps.golden-absent.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: golden-lane-marker
          path: golden-out/
          if-no-files-found: error

      - name: Run software-allowed recipe goldens
        if: env.FORGE3D_ALLOW_SOFTWARE_GOLDENS == '1'
        env:
          FORGE3D_NO_BOOTSTRAP: '1'
          FORGE3D_RECIPE_GOLDEN_ARTIFACT_DIR: tests/artifacts/recipe_goldens
        run: pytest tests/test_recipe_goldens.py -v --tb=short

      - name: Upload golden image artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-golden-diffs
          path: tests/artifacts/

  refresh-recipe-certificates:
    name: Refresh Recipe Certificates
    needs: build-wheels
    if: github.event_name == 'workflow_dispatch' && inputs.update_recipe_certificates
    runs-on: [self-hosted, Windows, X64, forge3d-gpu, gpu-nvidia]
    env:
      WGPU_BACKEND: vulkan
      FORGE3D_ALLOW_HOSTED_WINDOWS_TERRAIN: '1'
      FORGE3D_CERT_SIGNING_KEY: ${{ secrets.FORGE3D_CERT_SIGNING_KEY }}
      FORGE3D_REQUIRE_PRODUCTION_SIGNING: '1'

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - name: Verify runner Python
        run: python --version
      - uses: actions/download-artifact@v4
        with:
          name: wheels-windows
          path: dist/
      - name: Install wheel and test dependencies
        run: |
          python scripts/install_compatible_wheel.py dist
          pip install pytest numpy pyproj pillow
      - name: Require clean production GPU evidence
        env:
          FORGE3D_NO_BOOTSTRAP: '1'
        run: |
          if (-not $env:FORGE3D_CERT_SIGNING_KEY) { throw 'missing production signing key' }
          python scripts/terrain_ci_probe.py --mode terrain
      - name: Render and sign the recipe catalog
        env:
          FORGE3D_NO_BOOTSTRAP: '1'
          FORGE3D_RUN_TERRAIN_GOLDENS: '1'
          FORGE3D_UPDATE_RECIPE_CERTIFICATES: '1'
        run: pytest tests/test_recipe_goldens.py::test_recipe_goldens_render_and_match -v --tb=short
      - uses: actions/upload-artifact@v4
        with:
          name: refreshed-recipe-certificates
          path: tests/golden/certificates/*.json
          if-no-files-found: error

  # ============================================================================
  # M-06 Option-2 Full Geospatial Viewer acceptance
  #
  # This is a required, zero-skip hardware lane. An unavailable adapter, a
  # stale/missing release viewer, or a skipped acceptance test is a hard error.
  # ============================================================================
  test-m06-full-geospatial-viewer:
    name: M-06 Full Geospatial Viewer (NVIDIA Vulkan)
    needs: [build-wheels, prepare-lfs-fixtures]
    runs-on: [self-hosted, Windows, X64, forge3d-gpu, gpu-nvidia]
    timeout-minutes: 35
    env:
      WGPU_BACKEND: vulkan
      FORGE3D_NO_BOOTSTRAP: '1'
      FORGE3D_TEST_INSTALLED_WHEEL: '1'
      RUN_M06_VIEWER_CI: '1'
      FORGE3D_VIEWER_BINARY: ${{ github.workspace }}/target/release/interactive_viewer.exe
      FORGE3D_TEST_DEM: ${{ github.workspace }}/assets/tif/switzerland_dem.tif

    steps:
      - name: Initialize persistent M-06 evidence before checkout
        shell: pwsh
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          $artifactDir = Join-Path $env:RUNNER_TEMP "forge3d-m06-$env:GITHUB_RUN_ID-$env:GITHUB_RUN_ATTEMPT"
          "FORGE3D_M06_ARTIFACT_DIR=$artifactDir" | Add-Content $env:GITHUB_ENV
          $env:FORGE3D_M06_ARTIFACT_DIR = $artifactDir
          New-Item -ItemType Directory -Force $env:FORGE3D_M06_ARTIFACT_DIR | Out-Null
          "initialized=$(Get-Date -Format o)" | Set-Content "$env:FORGE3D_M06_ARTIFACT_DIR/sentinel.txt"
          @{
            repository = $env:GITHUB_REPOSITORY
            base_sha = $env:BASE_SHA
            head_sha = $env:HEAD_SHA
            run_id = $env:GITHUB_RUN_ID
            run_attempt = $env:GITHUB_RUN_ATTEMPT
            job = $env:GITHUB_JOB
            runner_name = $env:RUNNER_NAME
            runner_os = $env:RUNNER_OS
            runner_arch = $env:RUNNER_ARCH
            required_labels = @('self-hosted', 'Windows', 'X64', 'forge3d-gpu', 'gpu-nvidia')
            required_backend = 'vulkan'
            installed_wheel_required = $true
          } | ConvertTo-Json -Depth 4 | Set-Content "$env:FORGE3D_M06_ARTIFACT_DIR/run-context.json"

      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Download shared LFS fixture artifact
        uses: actions/download-artifact@v4
        with:
          name: lfs-fixture-bundles
          path: lfs-fixture-bundles

      - name: Restore the M-06 DEM only
        shell: pwsh
        run: Expand-Archive lfs-fixture-bundles/m06-dem.zip -DestinationPath . -Force

      - name: Capture checkout and LFS provenance
        if: always()
        shell: pwsh
        run: |
          try { git rev-parse HEAD | Set-Content "$env:FORGE3D_M06_ARTIFACT_DIR/checked-out-head.txt" } catch { $_ | Out-String | Set-Content "$env:FORGE3D_M06_ARTIFACT_DIR/checkout-error.txt" }
          try { git lfs env 2>&1 | Set-Content "$env:FORGE3D_M06_ARTIFACT_DIR/git-lfs-env.txt" } catch { $_ | Out-String | Set-Content "$env:FORGE3D_M06_ARTIFACT_DIR/git-lfs-error.txt" }
          try { git lfs ls-files --long 2>&1 | Set-Content "$env:FORGE3D_M06_ARTIFACT_DIR/git-lfs-files.txt" } catch { $_ | Out-String | Add-Content "$env:FORGE3D_M06_ARTIFACT_DIR/git-lfs-error.txt" }

      - name: Select stable Rust toolchain
        shell: pwsh
        run: |
          rustup default stable
          rustup show active-toolchain | Set-Content "$env:FORGE3D_M06_ARTIFACT_DIR/rust-toolchain.txt"

      - name: Use runner-provisioned Python
        shell: pwsh
        run: |
          python --version 2>&1 | Tee-Object "$env:FORGE3D_M06_ARTIFACT_DIR/python-bootstrap-version.txt"
          python -c "import sys; raise SystemExit(0 if sys.version_info >= (3, 10) else 1)"

      - uses: actions/download-artifact@v4
        with:
          name: wheels-windows
          path: dist/

      - name: Install wheel and acceptance dependencies
        shell: pwsh
        run: |
          python --version 2>&1 | Set-Content "$env:FORGE3D_M06_ARTIFACT_DIR/python-version.txt"
          rustc -Vv 2>&1 | Set-Content "$env:FORGE3D_M06_ARTIFACT_DIR/rustc-version.txt"
          cargo -Vv 2>&1 | Set-Content "$env:FORGE3D_M06_ARTIFACT_DIR/cargo-version.txt"
          Get-ChildItem dist -Filter *.whl | ForEach-Object {
            Get-FileHash $_.FullName -Algorithm SHA256 | Format-List | Out-String
          } | Set-Content "$env:FORGE3D_M06_ARTIFACT_DIR/wheel-sha256.txt"
          python scripts/install_compatible_wheel.py dist *>&1 | Tee-Object "$env:FORGE3D_M06_ARTIFACT_DIR/wheel-install.log"
          $wheelCode = $LASTEXITCODE
          python -m pip install pytest numpy scipy pillow rasterio laspy pyproj pooch *>&1 | Tee-Object "$env:FORGE3D_M06_ARTIFACT_DIR/dependency-install.log"
          $dependencyCode = $LASTEXITCODE
          "wheel_install=$wheelCode`ndependencies=$dependencyCode" | Set-Content "$env:FORGE3D_M06_ARTIFACT_DIR/install-exit-codes.txt"
          python -m pip freeze | Set-Content "$env:FORGE3D_M06_ARTIFACT_DIR/python-dependencies.txt"
          python -c "import hashlib, json, pathlib, forge3d, forge3d._forge3d as native; p=pathlib.Path(native.__file__).resolve(); print(json.dumps({'package': str(pathlib.Path(forge3d.__file__).resolve()), 'native_extension': str(p), 'native_sha256': hashlib.sha256(p.read_bytes()).hexdigest()}, indent=2))" | Set-Content "$env:FORGE3D_M06_ARTIFACT_DIR/installed-wheel-runtime.json"
          if ($wheelCode -ne 0) { exit $wheelCode }
          if ($dependencyCode -ne 0) { exit $dependencyCode }

      - name: Build the exact release viewer under test
        shell: pwsh
        run: |
          $command = 'cargo build --release --bin interactive_viewer --features async_readback,enable-gpu-instancing'
          $command | Set-Content "$env:FORGE3D_M06_ARTIFACT_DIR/build-command.txt"
          cargo build --release --bin interactive_viewer --features async_readback,enable-gpu-instancing *>&1 | Tee-Object "$env:FORGE3D_M06_ARTIFACT_DIR/build.log"
          $code = $LASTEXITCODE
          "build=$code" | Set-Content "$env:FORGE3D_M06_ARTIFACT_DIR/build-exit-code.txt"
          if (Test-Path $env:FORGE3D_VIEWER_BINARY) {
            Get-FileHash $env:FORGE3D_VIEWER_BINARY -Algorithm SHA256 | Format-List | Out-String | Set-Content "$env:FORGE3D_M06_ARTIFACT_DIR/viewer-sha256.txt"
          }
          exit $code

      - name: Run M-06 Rust ABI and adapter gates
        shell: pwsh
        run: |
          $features = 'default,async_readback,copc_laz,cog_streaming,gis-remote,geos-topology,weighted-oit,wsI_bigbuf,wsI_double_buf,enable-pbr,enable-tbn,enable-normal-mapping,enable-hdr-offscreen,enable-renderer-config,enable-staging-rings,shader-contract-asserts'
          $filters = @('terrain_uniform_abi_tests', 'backend_request_tests', 'camera::anchor::tests')
          $filters -join "`n" | Set-Content "$env:FORGE3D_M06_ARTIFACT_DIR/rust-test-filters.txt"
          $failed = 0
          foreach ($filter in $filters) {
            cargo test --release --features $features $filter -- --test-threads=1 *>&1 | Tee-Object -Append "$env:FORGE3D_M06_ARTIFACT_DIR/rust-gates.log"
            if ($LASTEXITCODE -ne 0) { $failed = $LASTEXITCODE; break }
          }
          "rust_gates=$failed" | Set-Content "$env:FORGE3D_M06_ARTIFACT_DIR/rust-gates-exit-code.txt"
          exit $failed

      - name: Require the exact NVIDIA Vulkan adapter
        shell: pwsh
        run: |
          python scripts/terrain_ci_probe.py --mode terrain --require-nvidia-vulkan --json "$env:FORGE3D_M06_ARTIFACT_DIR/adapter-probe.json" *>&1 | Tee-Object "$env:FORGE3D_M06_ARTIFACT_DIR/adapter-probe.log"
          $code = $LASTEXITCODE
          "adapter_probe=$code" | Set-Content "$env:FORGE3D_M06_ARTIFACT_DIR/adapter-probe-exit-code.txt"
          exit $code

      - name: Run M-06 source and live acceptance
        shell: pwsh
        run: |
          $hdriDir = Join-Path $env:GITHUB_WORKSPACE 'assets/hdri'
          New-Item -ItemType Directory -Force $hdriDir | Out-Null
          python -c "from pathlib import Path; from tests.test_terrain_viewer_pbr import write_asymmetric_test_hdr; write_asymmetric_test_hdr(Path('assets/hdri/brown_photostudio_02_4k.hdr'))"
          $tests = @(
            'tests/test_m06_anchoring_boundary.py',
            'tests/test_world_coord_f32_gate.py',
            'tests/test_m06_viewer_matrix_contract.py',
            'tests/test_m06_single_rebase_contract.py',
            'tests/test_m06_temporal_resource_contract.py',
            'tests/test_m06_scene_review_transaction.py',
            'tests/test_m06_command_transaction.py',
            'tests/test_m06_python_viewer_contracts.py',
            'tests/test_gis_raster.py',
            'tests/test_gis_crs_affine.py',
            'tests/test_3dtiles_parse.py',
            'tests/test_buildings_cityjson.py',
            'tests/test_viewer_ipc.py',
            'tests/test_api_contracts.py',
            'tests/test_install_smoke.py',
            'tests/test_allocation_gate.py',
            'tests/test_no_silent_degradation.py',
            'tests/test_certificate_verifier.py',
            'tests/test_render_certificate_contract.py',
            'tests/test_recipe_goldens.py::test_certificate_refresh_rejects_capability_degradation',
            'tests/test_recipe_goldens.py::test_recipe_golden_gate_rejects_pixel_regression',
            'tests/test_m06_full_geospatial_viewer.py',
            'tests/test_terrain_viewer_pbr.py',
            'tests/test_vector_overlay_rendering.py'
          )
          $tests -join "`n" | Set-Content "$env:FORGE3D_M06_ARTIFACT_DIR/pytest-files.txt"
          $started = Get-Date
          python -m pytest @tests -v --tb=short --junitxml="$env:FORGE3D_M06_ARTIFACT_DIR/junit.xml" *>&1 | Tee-Object "$env:FORGE3D_M06_ARTIFACT_DIR/pytest.log"
          $pytestCode = $LASTEXITCODE
          $finished = Get-Date
          @{
            started = $started.ToString('o')
            finished = $finished.ToString('o')
            elapsed_seconds = ($finished - $started).TotalSeconds
          } | ConvertTo-Json | Set-Content "$env:FORGE3D_M06_ARTIFACT_DIR/test-timing.json"
          $verifyCode = 99
          if (Test-Path "$env:FORGE3D_M06_ARTIFACT_DIR/junit.xml") {
            python scripts/assert_junit_zero_skips.py "$env:FORGE3D_M06_ARTIFACT_DIR/junit.xml" *>&1 | Tee-Object "$env:FORGE3D_M06_ARTIFACT_DIR/junit-verifier.log"
            $verifyCode = $LASTEXITCODE
          } else {
            'JUnit was not produced' | Set-Content "$env:FORGE3D_M06_ARTIFACT_DIR/junit-verifier.log"
          }
          "pytest=$pytestCode`njunit_verifier=$verifyCode" | Set-Content "$env:FORGE3D_M06_ARTIFACT_DIR/test-exit-codes.txt"
          if ($pytestCode -ne 0) { exit $pytestCode }
          if ($verifyCode -ne 0) { exit $verifyCode }

      - name: Summarize public M-06 evidence
        if: always()
        shell: pwsh
        run: |
          python scripts/summarize_m06_evidence.py "$env:FORGE3D_M06_ARTIFACT_DIR" *>&1 | Tee-Object "$env:FORGE3D_M06_ARTIFACT_DIR/public-evidence-summary.log"
          $summaryCode = $LASTEXITCODE
          "public_summary=$summaryCode" | Set-Content "$env:FORGE3D_M06_ARTIFACT_DIR/public-evidence-summary-exit-code.txt"
          if (Test-Path "$env:FORGE3D_M06_ARTIFACT_DIR/m06-public-evidence-summary.md") {
            Get-Content "$env:FORGE3D_M06_ARTIFACT_DIR/m06-public-evidence-summary.md" | Add-Content $env:GITHUB_STEP_SUMMARY
          }
          exit $summaryCode

      - name: Finalize evidence manifest
        if: always()
        shell: pwsh
        run: |
          @{
            finalized = (Get-Date -Format o)
            github_sha = $env:GITHUB_SHA
            backend = $env:WGPU_BACKEND
            files = @(Get-ChildItem $env:FORGE3D_M06_ARTIFACT_DIR -Recurse -File | ForEach-Object {
              @{ path = $_.FullName.Substring($env:FORGE3D_M06_ARTIFACT_DIR.Length + 1); bytes = $_.Length; sha256 = (Get-FileHash $_.FullName -Algorithm SHA256).Hash }
            })
          } | ConvertTo-Json -Depth 5 | Set-Content "$env:FORGE3D_M06_ARTIFACT_DIR/evidence-manifest.json"

      - name: Upload M-06 evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: m06-full-geospatial-viewer-evidence
          path: ${{ runner.temp }}/forge3d-m06-${{ github.run_id }}-${{ github.run_attempt }}/
          if-no-files-found: error

  # ============================================================================
  # Documentation Build
  # ============================================================================
  build-docs:
    name: Build Documentation
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build Rust docs
        run: cargo doc --workspace --features default,async_readback,copc_laz,cog_streaming,gis-remote,geos-topology,weighted-oit,wsI_bigbuf,wsI_double_buf,enable-pbr,enable-tbn,enable-normal-mapping,enable-hdr-offscreen,enable-renderer-config,enable-staging-rings,shader-contract-asserts --no-deps

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Sphinx dependencies
        run: |
          pip install sphinx sphinx-rtd-theme myst-parser numpy pillow ipywidgets pooch

      - name: Build Sphinx docs
        run: |
          cd docs
          make html

      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: documentation
          path: |
            target/doc/
            docs/_build/html/

  # ============================================================================
  # Final Status
  # ============================================================================
  ci-success:
    name: CI Success
    needs: [prepare-lfs-fixtures, terrain-golden-paths, test-rust, build-wheels, test-python, test-terminus-fuzz, test-python-linux-arm, test-golden-images, refresh-recipe-certificates, test-m06-full-geospatial-viewer, build-docs]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Check all jobs succeeded
        run: |
          # Golden lane honesty: `test-golden-images` is gated by the
          # `terrain-golden-paths` paths filter via its job-level `if:`. When no
          # golden-relevant path changed the job is `skipped` — that is the ONLY
          # reason `skipped` is acceptable here. Whenever the paths filter DID
          # run the job, a golden pytest mismatch fails the job (no
          # continue-on-error shields the pytest step) and therefore fails this
          # aggregator. `absent` (no usable adapter) still reports as job
          # `success` and is surfaced by the lane line below, not swallowed.
          echo "golden lane: ${{ needs.test-golden-images.outputs.lane || 'skipped(paths)' }}"
          if [ "${{ needs.prepare-lfs-fixtures.result }}" != "success" ] || \
             [ "${{ needs.terrain-golden-paths.result }}" != "success" ] || \
             [ "${{ needs.test-rust.result }}" != "success" ] || \
             [ "${{ needs.build-wheels.result }}" != "success" ] || \
             [ "${{ needs.test-python.result }}" != "success" ] || \
             [ "${{ needs.test-terminus-fuzz.result }}" != "success" ] || \
             [ "${{ needs.test-python-linux-arm.result }}" != "success" ] || \
             { [ "${{ needs.test-golden-images.result }}" != "success" ] && [ "${{ needs.test-golden-images.result }}" != "skipped" ]; } || \
             { [ "${{ needs.refresh-recipe-certificates.result }}" != "success" ] && [ "${{ needs.refresh-recipe-certificates.result }}" != "skipped" ]; } || \
             [ "${{ needs.test-m06-full-geospatial-viewer.result }}" != "success" ] || \
             [ "${{ needs.build-docs.result }}" != "success" ]; then
            echo "❌ CI failed"
            exit 1
          else
            echo "✅ CI passed"
          fi
