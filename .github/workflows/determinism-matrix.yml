# TERRA-DETERMINATA: cross-vendor bit-exact rendering gate.
#
# Renders the canonical terrain+CSM+IBL reference scene (forge3d.determinism)
# on a {intel, amd, nvidia, apple, wasm} matrix and fails the build if any two
# produced SHA-256 hashes differ, or if any differs from the committed golden
# tests/goldens/determinism/terra_determinata_v1.sha256. Zero-byte tolerance.
#
# Gated vs informational legs (follows the repo convention of skipping visual
# goldens on unsupported hosted GPUs, see ci.yml test-golden-images):
#   - apple  : documented hosted absence. Measured 2026-07-10: runners expose an
#              "Apple Paravirtual device" (VM GPU), NOT a physical M-series
#              chip, and wgpu 0.19's Metal backend compiles MSL with Metal's
#              default fastMathEnabled=true (no toggle) — the VM hash is
#              bit-stable across runs but systematically differs from the
#              dx12/vulkan golden, so it must never be enforced against
#              hardware goldens. Deterministic mode therefore REFUSES
#              virtualized adapters (src/core/gpu.rs), which writes an auditable
#              FAILED marker. Only this exact diagnostic is nonblocking; the
#              diff gate recognizes that documented absence. A self-hosted
#              M-series runner produces a hash the diff gate enforces (also
#              needs a wgpu with fast-math control for parity). Do not soften
#              the diff.
#   - intel  : informational on hosted ubuntu (no Intel GPU; llvmpipe/lavapipe
#              are software adapters). Becomes gated on a self-hosted
#              gpu-intel runner.
#   - amd    : informational on hosted windows (no AMD GPU; WARP is software).
#              Becomes gated on a self-hosted gpu-amd runner.
#   - nvidia : informational on hosted ubuntu (no NVIDIA GPU). Becomes gated
#              on a self-hosted gpu-nvidia runner.
#   - wasm   : the relaxed-SIMD build-policy check is GATED (RUSTFLAGS /
#              .cargo config must never enable +relaxed-simd — it is
#              nondeterministic by design). The render itself is informational
#              until a browser-backed WebGPU runner exists.
#
# Informational legs still attempt a real render: if a hardware adapter is
# present they upload a hash that the diff job enforces; if not they upload an
# explicit ABSENT marker with the reason (loud, never a silent placeholder).

name: determinism-matrix

on:
  workflow_dispatch:
  # push trigger so direct-to-main work can never silently skip the matrix
  # again (the original scaffolding landed on main without a single run).
  push:
    branches: [main]
    paths:
      - 'src/shaders/includes/determinism.wgsl'
      - 'src/shaders/includes/tonemap_common.wgsl'
      - 'src/shaders/csm.wgsl'
      - 'src/shaders/lighting_ibl.wgsl'
      - 'src/shaders/terrain_pbr_pom.wgsl'
      - 'src/core/gpu.rs'
      - 'python/forge3d/determinism.py'
      - 'scripts/check_determinism_hashes.py'
      - 'tests/test_determinism_hash.py'
      - 'tests/test_determinism_matrix.py'
      - 'python/forge3d/anamnesis.py'
      - 'src/core/anamnesis/**'
      - 'scripts/check_anamnesis_portability.py'
      - 'tests/test_anamnesis_*.py'
      - 'tests/goldens/determinism/**'
      - '.github/workflows/determinism-matrix.yml'
  pull_request:
    paths:
      - 'src/shaders/includes/determinism.wgsl'
      - 'src/shaders/includes/tonemap_common.wgsl'
      - 'src/shaders/csm.wgsl'
      - 'src/shaders/lighting_ibl.wgsl'
      - 'src/shaders/terrain_pbr_pom.wgsl'
      - 'src/core/gpu.rs'
      - 'python/forge3d/determinism.py'
      - 'scripts/check_determinism_hashes.py'
      - 'tests/test_determinism_hash.py'
      - 'tests/test_determinism_matrix.py'
      - 'python/forge3d/anamnesis.py'
      - 'src/core/anamnesis/**'
      - 'scripts/check_anamnesis_portability.py'
      - 'tests/test_anamnesis_*.py'
      - 'tests/goldens/determinism/**'
      - '.github/workflows/determinism-matrix.yml'

env:
  SCENE: terra_determinata_v1

jobs:
  render:
    name: render (${{ matrix.leg }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - leg: intel
            os: ubuntu-latest
            backend: vulkan
            gated: false
          - leg: amd
            os: windows-latest
            backend: dx12
            gated: false
          - leg: nvidia
            os: ubuntu-latest
            backend: vulkan
            gated: false
          - leg: apple
            os: macos-14
            backend: metal
            gated: true
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ !matrix.gated }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Mesa Vulkan drivers (Linux legs)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y mesa-vulkan-drivers vulkan-tools libvulkan1
      - name: Build extension
        shell: bash
        run: |
          # maturin develop refuses to run without a virtualenv; hosted
          # runners provide none, so create one and persist it for the
          # render step (bin/ on unix, Scripts/ on windows).
          python -m venv .venv
          if [ -f .venv/bin/activate ]; then source .venv/bin/activate; else source .venv/Scripts/activate; fi
          echo "VIRTUAL_ENV=$VIRTUAL_ENV" >> "$GITHUB_ENV"
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"
          echo "$PWD/.venv/Scripts" >> "$GITHUB_PATH"
          python -m pip install -U pip maturin numpy
          maturin develop --release
      - name: Render canonical scene
        shell: bash
        env:
          FORGE3D_DETERMINISTIC: '1'
          WGPU_BACKENDS: ${{ matrix.backend }}
        run: |
          mkdir -p hash-out
          # pipefail: without it $? is tee's exit code and a failed render
          # (e.g. the deterministic-mode software-adapter refusal) would be
          # misread as success instead of taking the ABSENT path below.
          set +e
          set -o pipefail
          python -m forge3d.determinism \
            --scene "$SCENE" --width 512 --height 512 \
            --out-png "hash-out/${SCENE}.png" 2>render.err | tee render.log
          status=$?
          set -e
          set +o pipefail
          cat render.err
          if [ $status -eq 0 ]; then
            python - <<'EOF'
          import json, pathlib
          last = pathlib.Path('render.log').read_text().strip().splitlines()[-1]
          rec = json.loads(last)
          sha = rec['sha256']
          pathlib.Path('hash-out/${{ env.SCENE }}.sha256').write_text(sha + '\n')
          # Persist the full JSON record (incl. adapter identity) next to the
          # hash so the artifact is attributable to real hardware.
          pathlib.Path('hash-out/${{ env.SCENE }}.json').write_text(json.dumps(rec) + '\n')
          print('hash:', sha)
          print('adapter:', json.dumps(rec.get('adapter')))
          EOF
          elif [ "${{ matrix.gated }}" = "true" ]; then
            echo "GATED leg '${{ matrix.leg }}' failed to render — failing the build."
            # Leave an auditable marker (uploaded via if: always()) so the diff
            # job can print WHY the gated leg has no hash.
            {
              echo "gated leg '${{ matrix.leg }}' failed to render (exit $status)"
              tail -n 20 render.log || true
              tail -n 20 render.err || true
            } > "hash-out/${SCENE}.FAILED"
            if [ "${{ matrix.leg }}" = "apple" ] && grep -q "hypervisor-virtualized GPU" render.err; then
              echo "documented Apple Paravirtual adapter absence"
              exit 0
            fi
            exit $status
          else
            echo "informational leg '${{ matrix.leg }}': no usable hardware adapter on this hosted runner" \
              | tee "hash-out/${SCENE}.ABSENT"
            tail -n 20 render.log >> "hash-out/${SCENE}.ABSENT" || true
            tail -n 20 render.err >> "hash-out/${SCENE}.ABSENT" || true
          fi
      - uses: actions/upload-artifact@v4
        # always(): a gated leg that fails still uploads its .FAILED marker so
        # the diff job can report the reason instead of a silent hole.
        if: always()
        with:
          name: determinism-hash-${{ matrix.leg }}
          path: hash-out/
          if-no-files-found: error

  wasm-policy:
    name: render (wasm) — relaxed-SIMD policy gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - name: Forbid relaxed-SIMD in any build configuration (GATED)
        run: |
          # Relaxed SIMD is nondeterministic by design (results may vary per
          # engine/hardware). The wasm build path must never enable it:
          # RUSTFLAGS / target-features must NOT include +relaxed-simd.
          if grep -rn "relaxed-simd" .cargo/ Cargo.toml pyproject.toml .github/workflows/ --include='*' 2>/dev/null | grep -v "determinism-matrix.yml"; then
            echo "relaxed-simd found in build configuration — nondeterministic, forbidden."
            exit 1
          fi
          echo "OK: no build path enables +relaxed-simd."
      - name: Document informational render status
        run: |
          mkdir -p hash-out
          echo "informational leg 'wasm': hosted runners have no browser WebGPU device;" \
               "render leg activates when a browser-backed runner (e.g. wgpu-in-chrome) is available." \
               > "hash-out/${SCENE}.ABSENT"
      - uses: actions/upload-artifact@v4
        with:
          name: determinism-hash-wasm
          path: hash-out/
          if-no-files-found: error

  anamnesis-seed:
    name: anamnesis golden-store seed (linux/vulkan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - name: Prove exact-head checkout
        shell: bash
        env:
          EXPECTED_HEAD: ${{ github.event.pull_request.head.sha || github.sha }}
        run: test "$(git rev-parse HEAD)" = "$EXPECTED_HEAD"
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Mesa Vulkan drivers
        run: |
          sudo apt-get update
          sudo apt-get install -y mesa-vulkan-drivers vulkan-tools libvulkan1
      - name: Build extension
        run: |
          python -m venv .venv
          source .venv/bin/activate
          python -m pip install -U pip maturin numpy pytest
          maturin develop --release
      - name: Gate ANAMNESIS incrementality, speed, hermeticity, and corruption handling
        run: |
          source .venv/bin/activate
          python -m pytest \
            tests/test_anamnesis_incremental.py \
            tests/test_anamnesis_adversarial_keys.py \
            tests/test_anamnesis_inertness.py \
            tests/test_anamnesis_hermeticity.py \
            tests/test_anamnesis_portability.py \
            tests/test_anamnesis_uniform_layout.py \
            -v --tb=short
      - name: Render golden and populate portable store
        shell: bash
        env:
          FORGE3D_DETERMINISTIC: '1'
          WGPU_BACKENDS: vulkan
        run: |
          source .venv/bin/activate
          set +e
          set -o pipefail
          python -m forge3d.determinism \
            --scene terra_determinata_v1 --width 512 --height 512 \
            --out-png anamnesis-golden.png 2>anamnesis-render.err \
            | tee anamnesis-render.jsonl
          status=$?
          set -e
          set +o pipefail
          if [ $status -ne 0 ]; then
            if grep -Eq "software rasterizer|hypervisor-virtualized GPU|No suitable GPU adapter" anamnesis-render.err; then
              {
                echo "ABSENT: no physical Linux/Vulkan adapter for ANAMNESIS portability seed"
                tail -n 20 anamnesis-render.err || true
              } > ANAMNESIS.ABSENT
            else
              cat anamnesis-render.err
              exit $status
            fi
          else
            FORGE3D_RUN_GPU_ANAMNESIS=1 \
            FORGE3D_ANAMNESIS_RESULT_PATH=anamnesis-gpu-result.json \
              python -m pytest \
                tests/test_anamnesis_incremental.py::test_real_gpu_600_frame_acceptance \
                -v --tb=short
            python scripts/check_anamnesis_portability.py seed \
              --cache anamnesis-store --record anamnesis-record.json \
              --frame-blob anamnesis-golden.png \
              --golden tests/goldens/determinism/terra_determinata_v1.sha256 \
              --adapter-record anamnesis-render.jsonl
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: anamnesis-store-linux
          path: |
            anamnesis-store/
            anamnesis-record.json
            anamnesis-gpu-result.json
            ANAMNESIS.ABSENT
          if-no-files-found: error

  anamnesis-portability:
    name: anamnesis portability consume (windows)
    needs: anamnesis-seed
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - name: Prove exact-head checkout
        shell: bash
        env:
          EXPECTED_HEAD: ${{ github.event.pull_request.head.sha || github.sha }}
        run: test "$(git rev-parse HEAD)" = "$EXPECTED_HEAD"
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/download-artifact@v4
        with:
          name: anamnesis-store-linux
          path: seeded
      - name: Build extension
        shell: bash
        run: |
          python -m venv .venv
          source .venv/Scripts/activate
          python -m pip install -U pip maturin numpy
          maturin develop --release
      - name: Require portable hits and mismatch isolation
        shell: bash
        env:
          FORGE3D_DETERMINISTIC: '1'
          WGPU_BACKENDS: dx12
        run: |
          source .venv/Scripts/activate
          if [ -f seeded/ANAMNESIS.ABSENT ]; then
            echo "ABSENT: Linux/Vulkan seed host exposed no physical adapter"
          else
            set +e
            set -o pipefail
            python -m forge3d.determinism \
              --scene terra_determinata_v1 --width 512 --height 512 \
              --out-png anamnesis-consumer.png 2>anamnesis-consumer.err \
              | tee anamnesis-consumer.jsonl
            status=$?
            set -e
            set +o pipefail
            if [ $status -ne 0 ]; then
              if grep -Eq "software rasterizer|hypervisor-virtualized GPU|No suitable GPU adapter" anamnesis-consumer.err; then
                echo "ABSENT: Windows/DX12 consumer host exposed no physical adapter"
                exit 0
              fi
              cat anamnesis-consumer.err
              exit $status
            fi
            python scripts/check_anamnesis_portability.py check \
              --cache seeded/anamnesis-store --record seeded/anamnesis-record.json \
              --consumer-frame-blob anamnesis-consumer.png \
              --consumer-adapter-record anamnesis-consumer.jsonl
            python scripts/check_anamnesis_portability.py mismatch \
              --cache seeded/anamnesis-store --record seeded/anamnesis-record.json
          fi

  diff:
    name: diff hashes (zero-byte tolerance)
    needs: [render, wasm-policy]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - uses: actions/download-artifact@v4
        with:
          pattern: determinism-hash-*
          path: hashes
      - name: Fail on any pairwise or golden mismatch
        run: >-
          python scripts/check_determinism_hashes.py
          --hashes hashes
          --golden tests/goldens/determinism/${{ env.SCENE }}.sha256
          --scene ${{ env.SCENE }}
