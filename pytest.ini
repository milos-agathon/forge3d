# ./pytest.ini
# Central PyTest configuration for Forge3D test suite.
# Provides shared markers and discovery paths for consistent CI runs.
# RELEVANT FILES:tests/conftest.py,pytest.ini,docs/conf.py,pyproject.toml
[pytest]
testpaths = tests
filterwarnings =
    ignore::DeprecationWarning
markers =
    opbr: Workstream B PBR-focused tests.
    olighting: Workstream B lighting-focused tests.
    geometry: Workstream F geometry-focused tests.
    io: Workstream F IO-focused tests.
    viewer: Viewer-dependent tests requiring display/GPU resources.
    interactive_viewer: Interactive viewer E2E tests (requires display/GPU). Opt-in via RUN_INTERACTIVE_VIEWER_CI=1.
    offscreen: Offscreen GPU rendering tests requiring a usable graphics adapter.
    slow: Full-scale deterministic stress and mutation gates.
