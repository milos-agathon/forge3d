[alias]
# Canonical Rust lint gate used by local hooks and CI.
# This mirrors the supported feature matrix without requiring optional
# system dependencies from `--all-features` such as PROJ.
forge3d-clippy = [
    "clippy",
    "--workspace",
    "--all-targets",
    "--features",
    "extension-module,default,async_readback,copc_laz,cog_streaming,gis-remote,geos-topology,weighted-oit,wsI_bigbuf,wsI_double_buf,enable-pbr,enable-tbn,enable-normal-mapping,enable-hdr-offscreen,enable-renderer-config,enable-staging-rings,shader-contract-asserts",
    "--",
    "-D",
    "warnings",
]
