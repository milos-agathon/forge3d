# tests/UNRUN.toml
# CENSOR Task 13: files the default CI Python lane (scripts/ci_pytest_lane.py)
# must NOT collect, each with an honest, owner-attributed, expiring reason.
# A file belongs here ONLY if it fails or errors on a stock GitHub-hosted CI
# runner (no discrete GPU, no optional pip extras, only tracked files present)
# AND does not already self-skip. This list may only shrink.
#
# AUDIT METHOD (2026-07-10):
#   1. Full suite collected cleanly locally: 2878 tests, 0 collection errors.
#   2. Faithful CI simulation: a detached `git worktree` of HEAD (tracked files
#      only, so git-ignored examples are absent exactly as on a CI checkout),
#      the built _forge3d.pyd copied in, run with GITHUB_ACTIONS=true so the
#      hosted-CI terrain/GPU guards fire like a real runner. That single
#      `pytest tests/` invocation is authoritative because the CI lane runs the
#      whole tree at once (per-file/isolated runs disagree due to global GPU
#      and lighting state -- e.g. test_lighting_alignment passes in-suite).
#   3. Root conftest.py `pytest_ignore_collect` already auto-drops example-driven
#      tests when their git-ignored example is absent, so those (terrain_demo,
#      humanity_globe_video, lighting_alignment, mapscene_docs/examples/quickstart,
#      label_api_*, oit_transparency, ...) self-exclude on CI and are NOT listed.
#   4. GPU/terrain golden tests self-skip via _terrain_runtime.terrain_rendering_available()
#      (has_gpu()/hosted-CI probe) and are NOT listed.
#   5. test_dask_stub self-skips on CI (real runners have no xarray) and is NOT listed.
#   6. Each residual failure was attributed against the pre-CENSOR baseline
#      (3b4375a1): none are regressions from CENSOR work -- the P1/P2 map-asset
#      adapter tests are the documented `underdeveloped` story tests, and the
#      map_scene.py CENSOR diff touches none of the asserted symbols.
#
# The five git-ignored/untracked local example tests (france/iberia/italy/
# poland/romania) are absent from any CI checkout and are excluded from the
# accounting universe (git ls-files), not listed here.
#
# NOTE: the `[[entries]]` array-of-tables below IS the entries list; do not add a
# separate `entries = []` line (TOML forbids redefining an array-of-tables).

